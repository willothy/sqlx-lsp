name: ci

# Pushes to main run these checks through the release workflow, which calls
# this one as its gate — a second standalone run would only duplicate it.
on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # ubuntu runners ship a Docker daemon, so the testcontainers-backed
      # postgres and mysql suites run here too.
      - name: Test
        run: cargo test --locked
